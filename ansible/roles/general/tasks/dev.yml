# vim:ft=yaml.ansible
---
- name: Create directories
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/{{ item }}"
    state: directory
    mode: '755'
  loop:
    - .config
    - .local/bin
    - Developer
    - Developer/Clients
    - Developer/Personal
    - Developer/PoC
    - Developer/Global
    - .config/lazygit
    - .config/ghostty
    - .config/yazi

- name: Check if global docker-compose is already here
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/Developer/Global/docker-compose.yml"
  register: docker_status
  changed_when: false

- name: Docker global docker-compose
  ansible.builtin.copy:
    src: "{{ role_path }}/files/docker-compose.yml"
    dest: "{{ ansible_facts['env']['HOME'] }}/Developer/Global/docker-compose.yml"
    mode: '755'
  when: not docker_status.stat.exists

- name: Check bun
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/bun"
  register: bun_status

- name: Install bun
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://bun.sh/install | bash
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/bun"
  when:
    - not ansible_check_mode
    - not bun_status.stat.exists

- name: Check mode | Bun install preview
  ansible.builtin.debug:
    msg: "Would install bun ({{ ansible_facts['env']['HOME'] }}/.bun/bin/bun missing)."
  when:
    - ansible_check_mode
    - not bun_status.stat.exists

- name: Check NVM
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
  register: nvm_status

- name: Install NVM and Node
  ansible.builtin.shell: |
    set -o pipefail
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/refs/heads/master/install.sh | bash
    source $HOME/.nvm/nvm.sh
    nvm install --lts
    npm install -g pnpm
    npm install -g neovim
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh"
  when:
    - not ansible_check_mode
    - not nvm_status.stat.exists

- name: Check mode | NVM install preview
  ansible.builtin.debug:
    msg: "Would install NVM/Node ({{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh missing)."
  when:
    - ansible_check_mode
    - not nvm_status.stat.exists

- name: ZSH OMZ stat
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/oh-my-zsh.sh"
  register: zsh_status

- name: Install OhMyZSH
  ansible.builtin.shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/oh-my-zsh.sh"
  when:
    - not ansible_check_mode
    - not zsh_status.stat.exists

- name: Check mode | Oh My Zsh install preview
  ansible.builtin.debug:
    msg: "Would install Oh My Zsh ({{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/oh-my-zsh.sh missing)."
  when:
    - ansible_check_mode
    - not zsh_status.stat.exists

- name: Ensure OhMyZSH plugins directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins"
    state: directory
    mode: '755'
  when:
    - not ansible_check_mode
    - zsh_status.stat.exists

- name: Download OhMyZSH plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.dest }}"
    version: master
    update: true
  loop:
    - { repo: "https://github.com/joshskidmore/zsh-fzf-history-search", dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-fzf-history-search" }
    - { repo: "https://github.com/zsh-users/zsh-autosuggestions", dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions" }
    - { repo: "https://github.com/zsh-users/zsh-syntax-highlighting", dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"}
  when:
    - not ansible_check_mode
    - zsh_status.stat.exists

- name: Check mode | OhMyZSH plugins sync preview
  ansible.builtin.debug:
    msg: "Would sync Oh My Zsh plugins to latest master."
  when:
    - ansible_check_mode
    - zsh_status.stat.exists

- name: Ensure that ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: '700'

- name: Ensure SSH backup directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh-backups"
    state: directory
    mode: '700'

- name: Find existing SSH files
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    file_type: file
  register: ssh_existing_files

- name: Backup SSH directory before replacing
  ansible.builtin.command:
    argv:
      - tar
      - -czf
      - "{{ ansible_facts['env']['HOME'] }}/.ssh-backups/ssh-{{ ansible_facts['date_time']['year'] }}{{ ansible_facts['date_time']['month'] }}{{ ansible_facts['date_time']['day'] }}-{{ ansible_facts['date_time']['hour'] }}{{ ansible_facts['date_time']['minute'] }}{{ ansible_facts['date_time']['second'] }}.tar.gz"
      - -C
      - "{{ ansible_facts['env']['HOME'] }}"
      - .ssh
  when:
    - not ansible_check_mode
    - ssh_existing_files.matched | int > 0

- name: Find existing SSH backups
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.ssh-backups"
    patterns: "ssh-*.tar.gz"
    file_type: file
  register: ssh_backup_files
  when: not ansible_check_mode

- name: Remove old SSH backups (keep last 10)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (ssh_backup_files.files | sort(attribute='path', reverse=true))[10:] }}"
  when: not ansible_check_mode

- name: Create temporary SSH bundle file path
  ansible.builtin.tempfile:
    state: file
    suffix: .tar.gz
  register: ssh_bundle_temp
  when: not ansible_check_mode

- name: Copy and decrypt SSH bundle
  ansible.builtin.copy:
    src: "{{ role_path }}/files/ssh/ssh_bundle.tar.gz.vault"
    dest: "{{ ssh_bundle_temp.path }}"
    decrypt: true
    mode: '600'
  when: not ansible_check_mode

- name: Unarchive SSH bundle into ~/.ssh
  ansible.builtin.unarchive:
    src: "{{ ssh_bundle_temp.path }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    remote_src: true
    list_files: true
  when: not ansible_check_mode

- name: Check mode | SSH bundle restore preview
  ansible.builtin.debug:
    msg: "Would decrypt and restore SSH bundle into {{ ansible_facts['env']['HOME'] }}/.ssh."
  when: ansible_check_mode

- name: Collect SSH files
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    file_type: file
  register: ssh_files

- name: SSH key permissions for private files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: '600'
  loop: "{{ ssh_files.files }}"
  when: item.path | basename != 'known_hosts' and item.path | basename != 'known_hosts.old' and item.path | basename != 'authorized_keys' and (item.path | basename) is not match('.*\\.pub$')

- name: SSH key permissions for public keys
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: '644'
  loop: "{{ ssh_files.files }}"
  when: (item.path | basename) is match('.*\\.pub$')

- name: Remove temporary SSH bundle file
  ansible.builtin.file:
    path: "{{ ssh_bundle_temp.path }}"
    state: absent
  when: not ansible_check_mode

- name: Verify the origin is set correctly
  ansible.builtin.command: git remote get-url origin
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/dotfiles"
  register: current_origin
  failed_when: false
  changed_when: false

- name: Check configured git remotes
  ansible.builtin.command: git remote
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/dotfiles"
  register: dotfiles_remotes
  changed_when: false

- name: Set dotfiles remote URL
  ansible.builtin.command:
    argv:
      - git
      - remote
      - set-url
      - origin
      - git@github.com:Isur/dotfiles
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/dotfiles"
  when:
    - "'origin' in dotfiles_remotes.stdout_lines"
    - current_origin.stdout != "git@github.com:Isur/dotfiles"

- name: Add dotfiles remote URL if missing
  ansible.builtin.command:
    argv:
      - git
      - remote
      - add
      - origin
      - git@github.com:Isur/dotfiles
  args:
    chdir: "{{ ansible_facts['env']['HOME'] }}/dotfiles"
  when: "'origin' not in dotfiles_remotes.stdout_lines"

- name: TMUX plugin manager
  ansible.builtin.git:
    repo: "https://github.com/tmux-plugins/tpm"
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm"
    clone: true

- name: Link configs
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "nvim", dest: "{{ ansible_facts['env']['HOME'] }}/.config/nvim" }
    - { src: "zshrc-local", dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc" }
    - { src: "ghostty", dest: "{{ ansible_facts['env']['HOME'] }}/.config/ghostty/config" }
    - { src: "tmux.conf", dest: "{{ ansible_facts['env']['HOME'] }}/.tmux.conf" }
    - { src: "yazi/keymap.toml", dest: "{{ ansible_facts['env']['HOME'] }}/.config/yazi/keymap.toml"}
    - { src: "yazi/package.toml", dest: "{{ ansible_facts['env']['HOME'] }}/.config/yazi/package.toml"}
    - { src: "yazi/theme.toml", dest: "{{ ansible_facts['env']['HOME'] }}/.config/yazi/theme.toml"}
