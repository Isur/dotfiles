[location]
address         = "Tarnowskie Góry, Poland"
refresh_minutes = 30

[shell]
screen_time_enabled = true

[idle.behavior.lock]
timeout = 600
action = "lock"
enabled = true

[lockscreen]
blur_intensity = 0.5
blurred_desktop = true
tint_intensity = 0.7

[widget.battery]
enabled = false

[widget.brightness]
enabled = false

[widget.network]
enabled = false

[widget.wallpaper]
enabled = false

[theme.templates.user.nvim-base16]
input_path = "~/.config/nvim/lua/matugen-template.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = 'pkill -SIGUSR1 nvim'
